<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* success — spring bloom with overshoot, one-shot */
    @keyframes bloom {
      0%   { transform: scale(1);    opacity: 0.6; }
      30%  { transform: scale(1.22); opacity: 1;   }
      55%  { transform: scale(0.92); }
      75%  { transform: scale(1.06); }
      90%  { transform: scale(0.98); }
      100% { transform: scale(1);    }
    }
    #mark {
      transform-box: view-box;
      transform-origin: 50px 56.67px;
      animation: bloom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1 forwards;
    }
    /* petals reveal sequentially */
    #p0 { animation: fade-in 0.15s ease forwards; }
    #p1 { animation: fade-in 0.15s ease 0.08s forwards; opacity: 0; }
    #p2 { animation: fade-in 0.15s ease 0.16s forwards; opacity: 0; }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g id="p0" transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p1" transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p2" transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
