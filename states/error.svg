<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* error — horizontal shake 300ms, then still */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(3px); }
      30%  { transform: translateX(-3px); }
      45%  { transform: translateX(2px); }
      60%  { transform: translateX(-2px); }
      75%  { transform: translateX(1px); }
      90%  { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }
    #mark {
      animation: shake 0.3s ease 1 forwards;
    }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
