<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* warning — one petal pulses stroke-width asymmetrically, 800ms */
    @keyframes warn-pulse {
      0%, 100% { stroke-width: 2;   opacity: 1;   }
      50%       { stroke-width: 3.5; opacity: 0.75; }
    }
    /* p0 pulses — the "raised brow" equivalent */
    #p0 path { animation: warn-pulse 0.8s ease-in-out infinite; }
    /* p1 and p2 breathe slightly out of phase */
    #p1 path { animation: warn-pulse 0.8s ease-in-out 0.26s infinite; opacity: 0.6; }
    #p2 path { animation: warn-pulse 0.8s ease-in-out 0.53s infinite; opacity: 0.6; }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g id="p0" transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p1" transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p2" transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
