<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>byEhsan logo system — preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0514;
      color: #eeeef4;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      padding: 48px 32px;
      min-height: 100vh;
    }
    h1 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #f07828; margin-bottom: 48px; }
    h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #eeeef4; opacity: 0.4; margin-bottom: 24px; }
    section { margin-bottom: 56px; }
    .grid {
      display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start;
    }
    .cell {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .cell label {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #eeeef4; opacity: 0.5;
    }
    .cell svg, .cell img { display: block; }
    hr { border: none; border-top: 1px solid #eeeef4; opacity: 0.08; margin: 48px 0; }

    /* ── state colors ── */
    .c-orange  { color: #f07828; }
    .c-white   { color: #eeeef4; }
    .c-indigo  { color: #5901d8; }
    .c-green   { color: #2ecc71; }
    .c-red     { color: #e74c3c; }
    .c-dim     { color: #eeeef4; opacity: 0.4; }
  </style>
</head>
<body>

<h1>byEhsan — logo system preview</h1>

<!-- BASE -->
<section>
  <h2>Base mark</h2>
  <div class="grid">
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" class="c-orange">
        <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>512px · orange</label>
    </div>
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48" class="c-white">
        <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>48px · white</label>
    </div>
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24" class="c-orange">
        <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>24px favicon</label>
    </div>
  </div>
</section>

<hr>

<!-- STATES -->
<section>
  <h2>States</h2>
  <div class="grid">

    <!-- neutral -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-white">
        <style>
          @keyframes blink { 0%,92%,100%{opacity:1} 94%{opacity:.05} 96%{opacity:1} }
          .n-p{animation:blink 6s ease-in-out infinite}
        </style>
        <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g class="n-p" transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="n-p" transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="n-p" transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>neutral</label>
    </div>

    <!-- loading -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-indigo">
        <style>
          @keyframes step-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
          .l-m{transform-box:fill-box;transform-origin:50px 56.67px;animation:step-spin 1.2s steps(3,end) infinite}
        </style>
        <g class="l-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>loading</label>
    </div>

    <!-- success -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-green">
        <style>
          @keyframes bloom{0%{transform:scale(1);opacity:.6}30%{transform:scale(1.22);opacity:1}55%{transform:scale(.92)}75%{transform:scale(1.06)}90%{transform:scale(.98)}100%{transform:scale(1)}}
          @keyframes fi{from{opacity:0}to{opacity:1}}
          .s-m{transform-box:fill-box;transform-origin:50px 56.67px;animation:bloom .5s cubic-bezier(.34,1.56,.64,1) 1 forwards}
          .s-0{animation:fi .15s ease forwards}
          .s-1{animation:fi .15s ease .08s forwards;opacity:0}
          .s-2{animation:fi .15s ease .16s forwards;opacity:0}
        </style>
        <g class="s-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g class="s-0" transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="s-1" transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="s-2" transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>success</label>
    </div>

    <!-- warning -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-orange">
        <style>
          @keyframes wp{0%,100%{stroke-width:2;opacity:1}50%{stroke-width:3.5;opacity:.75}}
          .w-0 path{animation:wp .8s ease-in-out infinite}
          .w-1 path{animation:wp .8s ease-in-out .26s infinite;opacity:.6}
          .w-2 path{animation:wp .8s ease-in-out .53s infinite;opacity:.6}
        </style>
        <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g class="w-0" transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="w-1" transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="w-2" transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>warning</label>
    </div>

    <!-- error -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-red">
        <style>
          @keyframes shk{0%{transform:translateX(0)}15%{transform:translateX(3px)}30%{transform:translateX(-3px)}45%{transform:translateX(2px)}60%{transform:translateX(-2px)}75%{transform:translateX(1px)}90%{transform:translateX(-1px)}100%{transform:translateX(0)}}
          .e-m{animation:shk .3s ease 1 forwards}
        </style>
        <g class="e-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>error</label>
    </div>
  </div>
</section>

<hr>

<!-- HTTP -->
<section>
  <h2>HTTP states</h2>
  <div class="grid">

    <!-- 404 -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-white">
        <style>
          @keyframes tlt{0%,100%{transform:rotate(0)}20%{transform:rotate(6deg)}70%{transform:rotate(-6deg)}}
          @keyframes dft{0%,100%{opacity:1}40%{opacity:.4}80%{opacity:.9}}
          .t-m{transform-box:fill-box;transform-origin:50px 56.67px;animation:tlt 2.4s ease-in-out infinite}
          .t-1 path{animation:dft 2.4s ease-in-out .3s infinite}
          .t-2 path{animation:dft 2.4s ease-in-out .6s infinite}
        </style>
        <g class="t-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="t-1" transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g class="t-2" transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>404</label>
    </div>

    <!-- 500 -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-white">
        <style>
          @keyframes fl{0%{transform:translate(0,0);opacity:1}4%{transform:translate(2px,-1px)}8%{transform:translate(-2px,1px)}12%{transform:translate(1px,-1px);opacity:.7}16%,100%{transform:translate(0,0);opacity:.3}}
          .f-m{animation:fl .5s ease 1 forwards}
        </style>
        <g class="f-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
      </svg>
      <label>500</label>
    </div>

    <!-- 503 -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-dim">
        <style>
          @keyframes dz{0%,100%{opacity:.35}50%{opacity:.15}}
          @keyframes zz{0%{opacity:0;transform:translate(0,0) scale(.7)}15%{opacity:1}85%{opacity:.8}100%{opacity:0;transform:translate(14px,-14px) scale(1.1)}}
          .z-m{animation:dz 2s ease-in-out infinite}
          .z-t{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:600;font-size:14px;fill:currentColor;animation:zz 2s ease-in-out infinite}
        </style>
        <g class="z-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
        <text class="z-t" x="62" y="28">Zzz</text>
      </svg>
      <label>503</label>
    </div>

    <!-- 403 -->
    <div class="cell">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" class="c-red">
        <style>
          @keyframes wi{from{transform:scaleX(0);transform-origin:left center}to{transform:scaleX(1);transform-origin:left center}}
          @keyframes wo{from{transform:scaleX(1);transform-origin:right center}to{transform:scaleX(0);transform-origin:right center}}
          @keyframes dm{0%,100%{opacity:1}40%{opacity:.35}}
          .b-m{animation:dm .6s ease .1s 1 forwards}
          .b-i{animation:wi .25s ease-out .1s 1 forwards;transform:scaleX(0)}
          .b-o{animation:wo .25s ease-in  .5s 1 forwards}
        </style>
        <g class="b-m" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
        </g>
        <rect class="b-i" x="20" y="54" width="60" height="3" fill="currentColor" rx="1.5"/>
        <rect class="b-o" x="20" y="54" width="60" height="3" fill="currentColor" rx="1.5"/>
      </svg>
      <label>403</label>
    </div>

  </div>
</section>

<hr>

<!-- LOCKUPS -->
<section>
  <h2>Lockup system</h2>
  <div class="grid">
    <div class="cell" style="align-items:flex-start">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="440" height="112" style="color:#eeeef4">
        <svg x="0" y="4" width="48" height="48" viewBox="0 0 100 100">
          <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
            <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
            <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
            <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          </g>
        </svg>
        <line x1="48" y1="4" x2="48" y2="52" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
        <line x1="64" y1="4" x2="64" y2="52" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
        <rect x="64" y="4" width="152" height="48" fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.4"/>
        <text x="68" y="36" font-family="'Space Grotesk',system-ui,sans-serif" font-size="10" fill="currentColor" opacity="0.35">SUB-BRAND SLOT</text>
      </svg>
      <label>template</label>
    </div>
    <div class="cell" style="align-items:flex-start">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="440" height="112" style="color:#f07828">
        <svg x="0" y="4" width="48" height="48" viewBox="0 0 100 100">
          <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
            <g transform="rotate(0 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
            <g transform="rotate(120 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
            <g transform="rotate(240 50 56.67)"><path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/></g>
          </g>
        </svg>
        <text x="64" y="37" font-family="'Space Grotesk',system-ui,sans-serif" font-size="24" font-weight="600" letter-spacing="-0.5" fill="currentColor">blog</text>
      </svg>
      <label>blog lockup</label>
    </div>
  </div>
</section>

</body>
</html>
