<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap');
    /* 503 — asleep, slow breathe + Zzz floats up-right */
    @keyframes doze {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.15; }
    }
    @keyframes zzz {
      0%   { opacity: 0;   transform: translate(0px, 0px)   scale(0.7); }
      15%  { opacity: 1; }
      85%  { opacity: 0.8; }
      100% { opacity: 0;   transform: translate(14px, -14px) scale(1.1); }
    }
    #mark   { animation: doze 2s ease-in-out infinite; }
    #zzz    {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600;
      font-size: 14px;
      fill: currentColor;
      animation: zzz 2s ease-in-out infinite;
    }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
  <text id="zzz" x="62" y="28">Zzz</text>
</svg>
