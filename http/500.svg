<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* 500 — dying machine: glitch → dim → death rattle → flicker → repeat */
    @keyframes dying {
      0%   { transform: translate(0,0);      opacity: 1;    }
      3%   { transform: translate(2px,-1px); opacity: 0.9;  }
      6%   { transform: translate(-2px,1px); opacity: 0.7;  }
      9%   { transform: translate(1px,-1px); opacity: 0.45; }
      13%  { transform: translate(0,0);      opacity: 0.2;  }
      /* hold dead */
      72%  { transform: translate(0,0);      opacity: 0.2;  }
      /* death rattle */
      76%  { transform: translate(1px,0);    opacity: 0.28; }
      80%  { transform: translate(0,0);      opacity: 0.2;  }
      84%  { transform: translate(-1px,1px); opacity: 0.26; }
      88%  { transform: translate(0,0);      opacity: 0.2;  }
      /* flicker before reset */
      93%  { opacity: 0.6; }
      96%  { opacity: 1;   }
      100% { opacity: 1;   }
    }
    #mark { animation: dying 4s ease-in-out infinite; }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
