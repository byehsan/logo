<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* 404 — confused tilt, drifting petals */
    @keyframes tilt {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(6deg); }
      70%       { transform: rotate(-6deg); }
    }
    @keyframes drift {
      0%, 100% { opacity: 1; }
      40%       { opacity: 0.4; }
      80%       { opacity: 0.9; }
    }
    #mark {
      transform-box: fill-box;
      transform-origin: 50px 56.67px;
      animation: tilt 2.4s ease-in-out infinite;
    }
    #p1 path { animation: drift 2.4s ease-in-out 0.3s infinite; }
    #p2 path { animation: drift 2.4s ease-in-out 0.6s infinite; }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g id="p0" transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p1" transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g id="p2" transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
