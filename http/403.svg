<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <style>
    /* 403 — appears, tries to push through, gets refused, collapses. loops. */
    @keyframes refused-loop {
      0%    { transform: scale(0);    opacity: 0;   }
      15%   { transform: scale(1.05); opacity: 1;   }
      25%   { transform: scale(1);    opacity: 1;   }
      40%   { transform: scale(1.08); opacity: 1;   }
      62%   { transform: scale(0.2);  opacity: 0.2; }
      80%   { transform: scale(0);    opacity: 0;   }
      100%  { transform: scale(0);    opacity: 0;   }
    }
    #mark {
      transform-box: view-box;
      transform-origin: 50px 56.67px;
      animation: refused-loop 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
  <g id="mark" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
    <g transform="rotate(0 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(120 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
    <g transform="rotate(240 50 56.67)">
      <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
    </g>
  </g>
</svg>
