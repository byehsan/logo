name: Release Bundle

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

jobs:
  validate:
    name: Validate SVGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate all SVGs
        run: |
          find . -name "*.svg" -not -path "./.git/*" | while read f; do
            echo "Validating $f"
            xmllint --noout "$f" || exit 1
          done

  bundle:
    name: Build & Release Bundle
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install rsvg-convert (SVG → PNG)
        run: sudo apt-get install -y librsvg2-bin zip

      - name: Build bundle
        run: node scripts/bundle.mjs

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF_NAME}
          zip -r "byehsan-logo-${VERSION}.zip" dist/
          tar -czf "byehsan-logo-${VERSION}.tar.gz" dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            byehsan-logo-*.zip
            byehsan-logo-*.tar.gz
          generate_release_notes: true
          body: |
            ## byEhsan Logo Bundle ${{ github.ref_name }}

            ### Contents
            - SVG sources (all variants + states)
            - PNG exports: 16, 32, 64, 128, 256, 512px
            - `bundle.js` — CJS module (all SVGs as strings)
            - `bundle.esm.js` — ES module
            - `bundle.css` — CSS custom properties with data URIs
            - `palette.json` — brand color tokens

            ### Usage
            ```js
            // ES module
            import { portrait, logoColored, logoLoad } from './bundle.esm.js'

            // CJS
            const { portrait, logoColored } = require('./bundle.js')
            ```

            ### CSS
            ```css
            @import 'bundle.css';
            .hero { background-image: var(--logo-portrait); }
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
