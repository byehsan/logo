<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="440" height="112">
  <!--
    Lockup grid (all units in px, viewBox coords):
      Mark area : x=0,  y=0, w=48, h=56  (mark centered: y-offset=4 → 48px tall)
      Gap       : 16px (x=48 to x=64) — do not place content here
      Slot      : x=64, y=0, w=156, h=56 — variable-width sub-brand text
      Baseline  : text baseline at y=37 (optical center of 56px tall container)
      Cap-height: ~24px (matches mark optical center)
  -->

  <!-- Face mark — triskelion at 48×48, vertically centered in 56px -->
  <svg x="0" y="4" width="48" height="48" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
      <g transform="rotate(0 50 56.67)">
        <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
      </g>
      <g transform="rotate(120 50 56.67)">
        <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
      </g>
      <g transform="rotate(240 50 56.67)">
        <path d="M50,20 Q60,40 40,40 Q60,40 50,70 Q40,40 60,40 Q50,20 50,20 Z"/>
      </g>
    </g>
  </svg>

  <!-- Gap guide (non-exporting, stroke-dasharray) -->
  <line x1="48" y1="4" x2="48" y2="52" stroke="currentColor" stroke-width="0.5"
        stroke-dasharray="2,2" opacity="0.3"/>
  <line x1="64" y1="4" x2="64" y2="52" stroke="currentColor" stroke-width="0.5"
        stroke-dasharray="2,2" opacity="0.3"/>

  <!-- Slot guide box (dashed — non-exporting) -->
  <rect x="64" y="4" width="152" height="48" fill="none"
        stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Baseline guide -->
  <line x1="64" y1="37" x2="216" y2="37" stroke="currentColor" stroke-width="0.5"
        stroke-dasharray="1,3" opacity="0.25"/>

  <!-- Slot label -->
  <text x="68" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="10" fill="currentColor" opacity="0.35">SUB-BRAND SLOT</text>
</svg>
