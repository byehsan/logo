<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <image href="../portrait.svg" width="512" height="512"/>

  <!-- State badge — bottom right, spinning triskelion (indigo) -->
  <circle cx="420" cy="420" r="52" fill="#0a0514" stroke="#5901d8" stroke-width="3"/>
  <g transform="translate(420,420)">
    <g>
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#5901d8" stroke-width="3" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate"
          from="0 0 0" to="360 0 0" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="rotate(120,0,0)">
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#5901d8" stroke-width="3" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate"
          from="120 0 0" to="480 0 0" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="rotate(240,0,0)">
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#5901d8" stroke-width="3" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate"
          from="240 0 0" to="600 0 0" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
