<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <image href="../portrait.svg" width="512" height="512"/>

  <!-- State badge — bottom right, petals fade in sequentially (green) -->
  <circle cx="420" cy="420" r="52" fill="#0a0514" stroke="#2ecc71" stroke-width="3"/>
  <g transform="translate(420,420)">
    <g transform="rotate(0,0,0)">
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#2ecc71" stroke-width="3" stroke-linejoin="round" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
      </path>
    </g>
    <g transform="rotate(120,0,0)">
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#2ecc71" stroke-width="3" stroke-linejoin="round" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
      </path>
    </g>
    <g transform="rotate(240,0,0)">
      <path d="M0,-24 Q9,-9 -9,-9 Q9,-9 0,21 Q-9,-9 9,-9 Q0,-24 0,-24 Z"
            fill="none" stroke="#2ecc71" stroke-width="3" stroke-linejoin="round" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
      </path>
    </g>
  </g>
</svg>
